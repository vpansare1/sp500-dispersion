name: Daily dispersion update

on:
  schedule:
    # GitHub cron is UTC-only and can't follow US daylight saving, so a fixed
    # UTC time drifts an hour across DST: 07:00 UTC = 2:00am EST / 3:00am EDT.
    # (Use "0 6 * * *" instead if you prefer 2:00am EDT / 1:00am EST.)
    # Either way it runs well after the prior 4pm ET close, which is what the
    # snapshot captures. Runs every day; weekend/holiday runs are harmless --
    # the script is idempotent, so the re-computed row for the last trading
    # day just overwrites itself and the commit step finds nothing to push.
    # Note: GitHub cron can run late or be skipped under load; use
    # workflow_dispatch to trigger a missed day manually (it only captures
    # the latest close, so gaps in cap weights stay gaps).
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dispersion-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily update
        run: python daily_update.py

      - name: Commit & push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data output
          if git diff --staged --quiet; then
            echo "Nothing to commit (market holiday or duplicate run)."
          else
            git commit -m "dispersion update $(date -u +%F)"
            git push
          fi
